<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal | Smart Routine &amp; Product Advisor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <!------- Header / Branding ------->
      <header class="site-header">
        <img src="img/loreal-logo.png" alt="L'Oréal Logo" class="logo" />
        <h1 class="site-title">Smart Routine &amp; Product Advisor</h1>
      </header>

      <main id="main-content">
        <!-- Category Filter -->
        <div class="search-section">
          <label class="search-field" for="productSearch">
            <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
            <input
              id="productSearch"
              type="search"
              placeholder="Search products by name, brand, or keyword"
              aria-label="Search products"
            />
          </label>
          <label class="filter-field" for="categoryFilter">
            <i class="fa-solid fa-filter" aria-hidden="true"></i>
            <select
              id="categoryFilter"
              aria-label="Filter products by category"
            >
              <option value="all" selected>All Categories</option>
              <option value="cleanser">Cleansers</option>
              <option value="moisturizer">Moisturizers & Treatments</option>
              <option value="skincare">Skincare Serums & Treatments</option>
              <option value="haircare">Haircare</option>
              <option value="makeup">Makeup</option>
              <option value="hair color">Hair Color</option>
              <option value="hair styling">Hair Styling</option>
              <option value="men's grooming">Men's Grooming</option>
              <option value="suncare">Suncare</option>
              <option value="fragrance">Fragrance</option>
            </select>
          </label>
        </div>

        <!-- Products Grid -->
        <section aria-labelledby="productsHeading">
          <h2 id="productsHeading" class="visually-hidden">Products</h2>
          <div id="productsContainer" class="products-grid"></div>
          <button
            id="toggleProducts"
            class="toggle-products-btn"
            type="button"
            hidden
          >
            Show more products
          </button>
        </section>

        <!-- Selected Products -->
        <div class="selected-products">
          <h2>Selected Products</h2>
          <div id="selectedProductsList"></div>
          <button id="clearSelected" class="clear-selected-btn" type="button">
            Clear Selected Products
          </button>
          <button id="generateRoutine" class="generate-btn">
            <i class="fa-solid fa-wand-magic-sparkles"></i> Generate Routine
          </button>
        </div>

        <!------- Chat Area ------->
        <section class="chatbox">
          <h2>Let's Build Your Routine</h2>
          <div id="chatWindow" class="chat-window"></div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask me about products or routines…"
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn" name="Send Input">
              <i class="fa-solid fa-paper-plane"></i>
              <span class="visually-hidden">Send</span>
            </button>
          </form>
        </section>
      </main>

      <!------- Footer Links ------->
      <footer class="site-footer">
        <p>&copy; 2026 L'Oréal. All rights reserved.</p>
        <nav>
          <a
            href="https://www.loreal.com/en/"
            target="_blank"
            rel="noopener noreferrer"
            >Official Site</a
          >
          <a
            href="https://www.loreal.com/en/privacy-policy/"
            target="_blank"
            rel="noopener noreferrer"
            >Privacy Policy</a
          >
          <a
            href="https://www.loreal.com/en/group/global-terms-of-use/"
            target="_blank"
            rel="noopener noreferrer"
            >Terms of Use</a
          >
          <a
            href="https://www.loreal.com/en/usa/articles/contact-us/consumer-inquiries-usa/"
            target="_blank"
            rel="noopener noreferrer"
            >Contact</a
          >
        </nav>
      </footer>
    </div>

    <div id="productModal" class="product-modal" hidden>
      <div class="product-modal__overlay" data-modal-close></div>
      <section
        class="product-modal__panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="productModalTitle"
      >
        <button
          type="button"
          class="product-modal__close"
          aria-label="Close product details"
          data-modal-close
        >
          <i class="fa-solid fa-xmark" aria-hidden="true"></i>
        </button>
        <p class="product-modal__eyebrow">Product details</p>
        <h2 id="productModalTitle" class="product-modal__title"></h2>
        <div class="product-modal__content">
          <a
            id="productModalImageLink"
            class="product-modal__image-link"
            href="#"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Open product image in a new tab"
          >
            <img id="productModalImage" class="product-modal__image" alt="" />
          </a>
          <div class="product-modal__details">
            <dl class="product-modal__list">
              <div>
                <dt>Brand</dt>
                <dd id="productModalBrand"></dd>
              </div>
              <div>
                <dt>Category</dt>
                <dd id="productModalCategory"></dd>
              </div>
              <div>
                <dt>Product</dt>
                <dd id="productModalName"></dd>
              </div>
              <div>
                <dt>Description</dt>
                <dd id="productModalDescription"></dd>
              </div>
            </dl>
          </div>
        </div>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
